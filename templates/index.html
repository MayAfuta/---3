<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Rating Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #2d2d2d;
            position: relative;
            overflow-x: hidden;
            background: #f5e6d3;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/static/movie_bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.95);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 245, 230, 0.45) 0%, rgba(255, 235, 215, 0.45) 100%);
            z-index: -1;
        }

        .container {
            background: rgba(20, 20, 35, 0.92);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(220, 38, 38, 0.4);
            border-radius: 24px;
            padding: 45px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
            max-height: 90vh;
            overflow-y: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #dc2626, #b91c1c, #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #d1d5db;
            font-size: 0.95rem;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #dc2626, transparent);
            margin: 15px auto 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #dc2626;
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: #dc2626;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.25);
        }

        select option {
            background: #1f1f33;
            color: #ffffff;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 200px;
            overflow-y: auto;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            font-weight: 400;
            font-size: 0.9rem;
            color: #d1d5db;
            cursor: pointer;
        }

        .loading-text {
            color: #9ca3af;
            font-style: italic;
            padding: 10px;
            text-align: center;
        }

        .error-text {
            color: #dc2626;
            padding: 10px;
            text-align: center;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: #dc2626;
        }

        input[type="checkbox"]:hover {
            transform: scale(1.1);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: #ffffff;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #result {
            margin-top: 25px;
            padding: 22px;
            border-radius: 14px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            display: none;
        }

        #result.success {
            display: block;
            background: rgba(46, 204, 113, 0.15);
            border: 2px solid #2ecc71;
            color: #4ade80;
        }

        #result.error {
            display: block;
            background: rgba(231, 76, 60, 0.15);
            border: 2px solid #e74c3c;
            color: #dc2626;
            font-size: 1rem;
        }

        .rating-value {
            font-size: 3rem;
            display: block;
            margin-top: 8px;
            color: #4ade80;
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Movie Rating Predictor</h1>
            <p class="subtitle">Enter movie details to predict its IMDB rating in real-time</p>
            <div class="divider"></div>
        </div>

        <!-- Release Year -->
        <div class="form-group">
            <label for="year">Release Year</label>
            <select id="year" required>
                <option value="">Select a year</option>
            </select>
        </div>

        <!-- Runtime -->
        <div class="form-group">
            <label for="runtime">Runtime (Minutes)</label>
            <select id="runtime" required>
                <option value="">Select runtime</option>
            </select>
        </div>

        <!-- Genre -->
        <div class="form-group">
            <label>Genre (Select one or more)</label>
            <div class="checkbox-group" id="genreGroup">
            </div>
        </div>

        <!-- Language -->
        <div class="form-group">
            <label>Language (Select one or more)</label>
            <div class="checkbox-group" id="languageGroup">
            </div>
        </div>

        <!-- Country -->
        <div class="form-group">
            <label>Country (Select one or more)</label>
            <div class="checkbox-group" id="countryGroup">
            </div>
        </div>

        <!-- Actors -->
        <div class="form-group">
            <label>Actors (Select one or more)</label>
            <div class="checkbox-group" id="actorGroup">
            </div>
        </div>

        <!-- Known Budget -->
        <div class="form-group">
            <label for="has_budget">Known Budget</label>
            <select id="has_budget" required>
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <!-- Predict Button -->
        <button onclick="predictRating()">Predict Rating</button>

        <!-- Result Display -->
        <div id="result"></div>
    </div>

    <script>
        // Genre options
        const genres = ['Drama', 'Comedy', 'Romance', 'Action', 'Documentary', 'Crime', 'Thriller', 'Horror', 'Adventure', 'Mystery', 'Family', 'Fantasy', 'Biography', 'History', 'Sci-Fi', 'Music', 'Unknown', 'Other'];

        // Language options
        const languages = ['English', 'French', 'Hindi', 'Spanish', 'Unknown', 'Other'];

        // Country options
        const countries = ['United States', 'India', 'United Kingdom', 'France', 'Italy', 'Japan', 'Canada', 'Unknown', 'Other'];

        let allActors = [];

        // Generate Genre Checkboxes
        const genreGroup = document.getElementById('genreGroup');
        genres.forEach(genre => {
            const label = document.createElement('label');
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.value = genre;
            input.name = 'genre';
            label.appendChild(input);
            label.appendChild(document.createTextNode(genre));
            genreGroup.appendChild(label);
        });

        // Generate Language Checkboxes
        const languageGroup = document.getElementById('languageGroup');
        languages.forEach(language => {
            const label = document.createElement('label');
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.value = language;
            input.name = 'language';
            label.appendChild(input);
            label.appendChild(document.createTextNode(language));
            languageGroup.appendChild(label);
        });

        // Generate Country Checkboxes
        const countryGroup = document.getElementById('countryGroup');
        countries.forEach(country => {
            const label = document.createElement('label');
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.value = country;
            input.name = 'country';
            label.appendChild(input);
            label.appendChild(document.createTextNode(country));
            countryGroup.appendChild(label);
        });

        // Fetch and generate Actor Checkboxes
        async function loadActors() {
            const actorGroup = document.getElementById('actorGroup');
            actorGroup.innerHTML = '<div class="loading-text">Loading actors...</div>';

            try {
                const response = await fetch('/actors');
                const data = await response.json();
                
                // Clear the loading message
                actorGroup.innerHTML = '';
                
                // Add "Other" first, then all actors sorted
                allActors = ['Other', ...(data.actors || [])];
                
                // Generate checkboxes for each actor
                allActors.forEach(actor => {
                    const label = document.createElement('label');
                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.value = actor;
                    input.name = 'actor';
                    label.appendChild(input);
                    label.appendChild(document.createTextNode(actor));
                    actorGroup.appendChild(label);
                });
            } catch (err) {
                console.error('Error loading actors:', err);
                actorGroup.innerHTML = '<div class="error-text">Error loading actors. Please refresh the page.</div>';
            }
        }

        // Load actors when page loads
        loadActors();

        // Generate Release Years (1904 to 2024)
        const yearSelect = document.getElementById('year');
        for (let year = 2024; year >= 1904; year--) {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year;
            yearSelect.appendChild(option);
        }

        // Generate Runtime (Unknown + 60 to 300 minutes)
        const runtimeSelect = document.getElementById('runtime');
        
        // Add "Unknown" option first
        const unknownOption = document.createElement('option');
        unknownOption.value = 'unknown';
        unknownOption.textContent = 'Unknown';
        runtimeSelect.appendChild(unknownOption);
        
        // Add runtime options from 60 to 300
        for (let runtime = 60; runtime <= 300; runtime++) {
            const option = document.createElement('option');
            option.value = runtime;
            option.textContent = runtime + ' min';
            runtimeSelect.appendChild(option);
        }

        // Predict Rating Function
        async function predictRating() {
            const resultDiv = document.getElementById('result');
            const button = document.querySelector('button');

            // Get form values
            const year = document.getElementById('year').value;
            const runtime = document.getElementById('runtime').value;
            const genres_selected = Array.from(document.querySelectorAll('input[name="genre"]:checked')).map(cb => cb.value);
            const languages_selected = Array.from(document.querySelectorAll('input[name="language"]:checked')).map(cb => cb.value);
            const countries_selected = Array.from(document.querySelectorAll('input[name="country"]:checked')).map(cb => cb.value);
            const actors_selected = Array.from(document.querySelectorAll('input[name="actor"]:checked')).map(cb => cb.value);
            const has_budget = document.getElementById('has_budget').value;

            // Validate all fields
            if (!year) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = 'Please select a release year';
                return;
            }
            if (!runtime) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = 'Please select runtime';
                return;
            }
            if (genres_selected.length === 0) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = 'Please select at least one genre';
                return;
            }
            if (languages_selected.length === 0) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = 'Please select at least one language';
                return;
            }
            if (countries_selected.length === 0) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = 'Please select at least one country';
                return;
            }
            if (actors_selected.length === 0) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = 'Please select at least one actor';
                return;
            }
            if (!has_budget) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = 'Please select if budget is known';
                return;
            }

            // Prepare data to send
            const data = {
                year: parseInt(year),
                runtime: runtime === 'unknown' ? 'unknown' : parseInt(runtime),
                genres: genres_selected,
                languages: languages_selected,
                countries: countries_selected,
                actors: actors_selected,
                has_budget: has_budget === 'Yes'
            };

            console.log('Sending data:', data);

            try {
                // Disable button during request
                button.disabled = true;

                // Send request to backend
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                // Display result
                if (response.ok) {
                    resultDiv.className = 'success';
                    const rating = parseFloat(result.predicted_rating).toFixed(2);
                    resultDiv.innerHTML = `Predicted Rating: <span class="rating-value">${rating} / 10</span>`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = result.error || 'Error predicting rating';
                }
            } catch (err) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = 'Error connecting to server. Please try again.';
                console.error('Error:', err);
            } finally {
                // Re-enable button
                button.disabled = false;
            }
        }
    </script>

</body>

</html>
